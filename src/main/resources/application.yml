server:
  port: 8081

spring:
  jpa:
    database: POSTGRESQL
    show-sql: false
    hibernate:
      ddl-auto: none
    open-in-view: false
  datasource:
    platform: postgres
    url: jdbc:postgresql://localhost:5432/erudio_udemy
    username: postgres
    password: password
    driverClassName: org.postgresql.Driver
spring-doc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true